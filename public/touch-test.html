<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Touch Test</title>
  <style>
    body { font-family: system-ui; padding: 20px; max-width: 400px; margin: 0 auto; }
    .btn { display: block; width: 100%; padding: 20px; margin: 10px 0; 
            background: #E8734A; color: white; border: none; border-radius: 12px;
            font-size: 18px; font-weight: bold; text-align: center;
            cursor: pointer; -webkit-tap-highlight-color: transparent; }
    .counter { font-size: 48px; text-align: center; margin: 20px 0; }
  </style>
</head>
<body>
  <h1>Pure HTML Touch Test</h1>
  <p>This page has ZERO React. Just plain HTML + JavaScript.</p>
  
  <div class="counter" id="count">0</div>
  
  <button class="btn" onclick="increment()">Tap me (inline onclick)</button>
  
  <button class="btn" id="jsBtn">Tap me (addEventListener)</button>
  
  <a href="https://google.com" class="btn" style="text-decoration: none; display: block;">
    Go to Google (native link)
  </a>

  <script>
    let count = 0;
    function increment() {
      count++;
      document.getElementById('count').textContent = count;
      console.log('Inline onclick fired! count=' + count);
    }
    
    document.getElementById('jsBtn').addEventListener('click', function() {
      count++;
      document.getElementById('count').textContent = count;
      console.log('addEventListener click fired! count=' + count);
    });
    
    document.getElementById('jsBtn').addEventListener('touchend', function(e) {
      e.preventDefault();
      count++;
      document.getElementById('count').textContent = count;
      console.log('addEventListener touchend fired! count=' + count);
    });
    
    console.log('JavaScript loaded successfully');
  </script>
</body>
</html>
